<template>
    <lightning-card title="Accounts with Related Contacts" icon-name="standard:account">
        <div class="slds-p-around_medium">
            <!-- Error Message -->
            <template if:true={error}>
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error" role="alert">
                    <span class="slds-assistive-text">Error</span>
                    <h2>{error}</h2>
                </div>
            </template>

            <!-- Loading Spinner -->
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </template>

            <!-- Data Table -->
            <template if:true={hasData}>
                <div class="slds-box slds-theme_default">
                    <template for:each={accountsWithContacts} for:item="account">
                        <div key={account.accountId} class="slds-m-bottom_medium">
                            <!-- Account Header -->
                            <div class="slds-page-header slds-page-header_joined">
                                <div class="slds-page-header__row">
                                    <div class="slds-page-header__col-title">
                                        <div class="slds-media">
                                            <div class="slds-media__figure">
                                                <lightning-icon icon-name="standard:account" size="small"></lightning-icon>
                                            </div>
                                            <div class="slds-media__body">
                                                <h1 class="slds-page-header__title slds-truncate" title={account.accountName}>
                                                    {account.accountName}
                                                </h1>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Contacts Table -->
                            <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                                <thead>
                                    <tr class="slds-line-height_reset">
                                        <th class="slds-text-title_caps" scope="col">
                                            <div class="slds-truncate" title="Contact Name">Contact Name</div>
                                        </th>
                                        <th class="slds-text-title_caps" scope="col">
                                            <div class="slds-truncate" title="Email">Email</div>
                                        </th>
                                        <th class="slds-text-title_caps" scope="col">
                                            <div class="slds-truncate" title="Phone">Phone</div>
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template if:true={account.contacts.length}>
                                        <template for:each={account.contacts} for:item="contact">
                                            <tr key={contact.contactId} class="slds-hint-parent">
                                                <td data-label="Contact Name">
                                                    <div class="slds-truncate" title={contact.contactName}>
                                                        <lightning-icon icon-name="standard:contact" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                                        {contact.contactName}
                                                    </div>
                                                </td>
                                                <td data-label="Email">
                                                    <div class="slds-truncate" title={contact.email}>
                                                        {contact.email}
                                                    </div>
                                                </td>
                                                <td data-label="Phone">
                                                    <div class="slds-truncate" title={contact.phone}>
                                                        {contact.phone}
                                                    </div>
                                                </td>
                                            </tr>
                                        </template>
                                    </template>
                                    <template if:false={account.contacts.length}>
                                        <tr>
                                            <td colspan="3" class="slds-text-align_center slds-text-color_weak">
                                                No contacts found for this account
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                </div>
            </template>

            <!-- No Data Message -->
            <template if:true={noData}>
                <div class="slds-align_absolute-center slds-m-vertical_large">
                    <lightning-icon icon-name="utility:info" size="small" class="slds-m-right_small"></lightning-icon>
                    <p class="slds-text-color_weak">No accounts with contacts found</p>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
